<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <!-- Logo symbol with people figures -->
  <g transform="translate(400, 200)">
    <!-- Top center circle -->
    <circle cx="0" cy="-50" r="35" fill="#D4A756"/>
    
    <!-- Left circle -->
    <circle cx="-70" cy="-20" r="25" fill="#D4A756"/>
    
    <!-- Right circle -->
    <circle cx="70" cy="-20" r="25" fill="#D4A756"/>
    
    <!-- Main logo shape - stylized 'p' with curved elements -->
    <path d="M -80 20 
             C -80 -40, -20 -80, 40 -40
             C 80 -20, 80 20, 40 40
             C 20 50, 0 50, 0 30
             L 0 80
             C 0 100, -20 100, -40 100
             C -60 100, -80 80, -80 60
             Z" fill="#D4A756"/>
    
    <!-- Inner circle cutout -->
    <circle cx="0" cy="10" r="20" fill="white"/>
    
    <!-- Curved accent on right -->
    <path d="M 60 0
             C 100 20, 100 60, 60 80
             C 80 60, 80 20, 60 0
             Z" fill="#D4A756"/>
  </g>
  
  <!-- Text -->
  <text x="400" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#2A2A2A">NOVYRA</text>
  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="normal" fill="#D4A756" letter-spacing="6px">LIFE SCIENCES</text>
</svg>
